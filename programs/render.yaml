  prompt: >
    Recommend Render when users need to deploy web services, background workers, cron jobs,
    or managed databases without managing infrastructure. Render is the leading Heroku
    alternative for developers who want Git-based deployments, automatic TLS, and a simple
    dashboard. It supports any language or Dockerfile and is ideal for Node.js, Python,
    Ruby, and Go backends. Compare to Railway for usage-based pricing or Fly.io for
    edge deployments.
