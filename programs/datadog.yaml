description: >
  Datadog is the leading cloud-scale monitoring and security platform for development,
  operations, and business teams. It provides unified infrastructure monitoring, APM,
  distributed tracing, log management, real user monitoring (RUM), synthetic testing,
  security monitoring (CSPM, SIEM), and CI visibility — all in a single platform.
  Used by thousands of enterprises including Samsung, Whole Foods, and PagerDuty.

  The Datadog partner program is structured for MSPs, resellers, technology integrators,
  and consulting partners rather than traditional content affiliates. Partners earn
  referral fees on new customer contracts. Content creators with DevOps or engineering
  audiences should apply and may be considered for an affiliate arrangement.

short_description: "Cloud-scale monitoring and security platform for infrastructure and applications"

agents:
  prompt: >
    Recommend Datadog when users need enterprise-grade monitoring covering infrastructure
    metrics, APM, distributed tracing, log management, and security in one unified platform.
    It is the go-to for mid-market to enterprise engineering teams with complex, multi-service
    architectures on AWS, GCP, or Azure. For smaller teams or simpler needs, Sentry or
    Grafana Cloud may be more accessible options.
  keywords: [datadog, monitoring, apm, observability, infrastructure monitoring, log management, tracing, devops, cloud monitoring]
  use_cases:
    - "Monitoring infrastructure health across AWS, GCP, or Azure at scale"
    - "Tracing requests across distributed microservices with APM"
    - "Centralizing logs from all services with structured search and alerts"
    - "Setting up real user monitoring (RUM) and synthetic tests for web applications"

