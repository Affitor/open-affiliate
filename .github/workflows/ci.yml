name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  validate-programs:
    name: Validate Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Validate YAML schema
        run: npx tsx scripts/build-registry.ts

      - name: Build registry
        run: npm run registry:build

      - name: Verify program URLs (changed files)
        if: github.event_name == 'pull_request'
        run: npm run verify:changed

      - name: Verify all program URLs (weekly)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run verify
        continue-on-error: true

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report.json
          if-no-files-found: ignore
