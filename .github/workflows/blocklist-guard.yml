name: Blocklist guard

# Prevents accidental re-introduction of files that belong only in the private
# open-affiliate-pro repo. Fails CI on any PR or push to main that contains
# blocklisted paths.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if private paths appear
        run: |
          set -e
          BAD=()
          check() {
            if [ -e "$1" ]; then BAD+=("$1"); fi
          }
          # Scripts that use paid providers (SerpAPI, OpenAI, Brandfetch)
          check "scripts/verify-deep.ts"
          check "scripts/enrich-signup-urls.ts"
          check "scripts/fix-signup-urls.ts"
          check "scripts/download-logos.ts"
          check "scripts/import-partnerstack.ts"
          # Admin dashboard (moved to apps/ops in pro)
          check "src/app/admin"
          # Verification reports (regenerated by pipeline, not source)
          check "deep-verification-report.json"
          check "verification-report.json"
          check "enrichment-report.json"
          check "signup-url-report.json"
          # Secrets / auth state
          check ".playwright-auth.json"
          # Internal docs
          check "AUDIT-REPORT-2026-02-07.md"
          check "slack-draft-core369.txt"
          check "affitor-context.md"
          # Monorepo apps/services that don't belong in public
          for d in apps/ops apps/embed apps/pro services/workflows services/billing services/webhooks packages/mcp-pro packages/scoring-pro packages/ui-pro; do
            check "$d"
          done
          # Any .env variant other than .env.example
          for f in .env .env.local .env.production .env.uat; do
            if [ -e "$f" ]; then BAD+=("$f"); fi
          done
          # Pro-prefixed supabase migrations
          for f in supabase/migrations/pro_*.sql; do
            if [ -e "$f" ]; then BAD+=("$f"); fi
          done

          if [ ${#BAD[@]} -gt 0 ]; then
            echo "::error::These private paths leaked into the public repo:"
            printf '::error::  - %s\n' "${BAD[@]}"
            echo ""
            echo "These files live only in Affitor/open-affiliate-pro."
            echo "If they appeared here accidentally, revert the commit and investigate the sync pipeline."
            exit 1
          fi
          echo "✅ No blocklisted paths found in public repo."
